# Application Configuration
spring.application.name=Attendance Management System


#DATABASE
spring.datasource.url=jdbc:h2:mem:attendancedb
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=


# JPA/Hibernate Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.lob.non_contextual_creation=true

# Server Configuration
server.port=8080
server.error.include-message=always
server.error.include-stacktrace=never

# JWT Configuration
jwt.secret=mySecretKey123456789012345678901234567890
jwt.expiration=86400000

# Cloudinary Configuration
cloudinary.cloud-name=dn4jal3tn
cloudinary.api-key=359445359695156
cloudinary.api-secret=wTm2tVIywIbnA-m6HhpXXRSJ1P0

# File Upload Configuration
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# CORS Configuration
cors.allowed-origins=${FRONTEND_URL:http://localhost:3000}

# Logging Configuration
logging.level.root=INFO
logging.level.com.attendance=DEBUG
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %msg%n

# Actuator Configuration (Health Check)
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always
